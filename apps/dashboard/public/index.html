<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ClipFactory dashboard</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0d11; --panel:#151821; --muted:#8a93a6; --fg:#e7ecf3; --ok:#27d07f; --warn:#f2b544; --err:#ff6472; --accent:#4f8cff; }
    body { margin:0; font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:16px 24px; border-bottom:1px solid #222733; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    header .right { display:flex; align-items:center; gap:12px; }
    main { padding:24px; max-width:1200px; margin:0 auto; }
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
    .stat { background:var(--panel); padding:16px; border-radius:10px; }
    .stat .k { color:var(--muted); font-size:12px; }
    .stat .v { font-size:24px; font-weight:600; margin-top:4px; }
    table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden; }
    th, td { padding:10px 12px; border-bottom:1px solid #222733; text-align:left; }
    th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
    .pill { padding:2px 8px; border-radius:999px; font-size:12px; display:inline-block; }
    .pill.posted { background:#113a22; color:var(--ok); }
    .pill.pending_approval { background:#3a2f11; color:var(--warn); }
    .pill.rejected, .pill.expired, .pill.failed_capture, .pill.failed_edit, .pill.failed_post { background:#3a1118; color:var(--err); }
    a { color:#8ebbff; }
    button { padding:6px 12px; border-radius:6px; border:0; cursor:pointer; font-weight:600; background:var(--accent); color:#06122b; }
    button.ghost { background:#2a2f3a; color:var(--fg); }
    .login { display:flex; align-items:center; justify-content:center; min-height:60vh; }
    .login-card { background:var(--panel); padding:28px; border-radius:12px; width:340px; }
    .login-card h2 { margin:0 0 16px; font-size:16px; }
    .login-card input { width:100%; padding:10px; background:#0b0d11; color:var(--fg); border:1px solid #2a2f3a; border-radius:8px; font:inherit; box-sizing:border-box; margin-bottom:8px; }
    .login-card .err { color:var(--err); margin-top:10px; font-size:12px; }
    .login-card button { width:100%; margin-top:12px; padding:10px; }
  </style>
</head>
<body>
  <header>
    <strong>ClipFactory</strong>
    <div class="right">
      <span id="updated" style="color:var(--muted)"></span>
      <button id="logoutBtn" class="ghost" style="display:none">Sign out</button>
    </div>
  </header>
  <main id="main"></main>

  <script>
    const API = (window.CLIPFACTORY_API ?? "").replace(/\/$/, "");
    const TOKEN_KEY = "clipfactory.dashboard.token";

    function apiUrl(path) {
      return API ? `${API}${path}` : path;
    }

    function getToken() {
      const fromUrl = new URLSearchParams(window.location.search).get("t");
      if (fromUrl) {
        localStorage.setItem(TOKEN_KEY, fromUrl);
        // strip ?t= so the JWT isn't kept in the address bar
        const url = new URL(window.location.href);
        url.searchParams.delete("t");
        window.history.replaceState({}, "", url.toString());
        return fromUrl;
      }
      return localStorage.getItem(TOKEN_KEY) ?? "";
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
    }

    function renderLogin(errMsg) {
      document.getElementById("main").innerHTML = `
        <div class="login">
          <form class="login-card" id="loginForm">
            <h2>Sign in</h2>
            <input id="username" type="text" placeholder="Username" autocomplete="username" required />
            <input id="secret" type="password" placeholder="Password" autocomplete="current-password" required />
            <button type="submit">Sign in</button>
            <div class="err" id="loginErr">${errMsg ?? ""}</div>
          </form>
        </div>`;
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const secret = document.getElementById("secret").value;
        const errEl = document.getElementById("loginErr");
        errEl.textContent = "Signing in…";
        try {
          const res = await fetch(apiUrl(`/api/auth/login`), {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, password: secret }),
          });
          if (!res.ok) {
            errEl.textContent = res.status === 401 ? "Invalid username or password." : `Sign-in failed (${res.status}).`;
            return;
          }
          const { token } = await res.json();
          localStorage.setItem(TOKEN_KEY, token);
          renderDashboardShell();
          load();
        } catch (err) {
          errEl.textContent = "Network error: " + err;
        }
      });
    }

    function renderDashboardShell() {
      document.getElementById("main").innerHTML = `
        <section class="stats" id="stats"></section>
        <table>
          <thead><tr><th>ID</th><th>Status</th><th>Triggered by</th><th>Triggered at</th><th>Posted</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>`;
      const logout = document.getElementById("logoutBtn");
      logout.style.display = "inline-block";
      logout.onclick = () => {
        clearToken();
        renderLogin();
      };
    }

    async function load() {
      const token = getToken();
      if (!token) {
        renderLogin();
        return;
      }
      try {
        const res = await fetch(apiUrl(`/api/dashboard?t=${encodeURIComponent(token)}`));
        if (res.status === 403) {
          clearToken();
          renderLogin("Session expired. Sign in again.");
          return;
        }
        if (!res.ok) {
          document.getElementById("updated").textContent = `error: HTTP ${res.status}`;
          return;
        }
        const ct = res.headers.get("content-type") ?? "";
        if (!ct.includes("application/json")) {
          document.getElementById("updated").textContent = "error: API returned non-JSON (proxy misconfigured?)";
          return;
        }
        const data = await res.json();
        render(data.clips ?? [], data.stats ?? {});
      } catch (e) {
        document.getElementById("updated").textContent = "error: " + e;
      }
    }

    function render(clips, stats) {
      const avgMin = stats?.avg_minutes_to_post != null ? Math.round(stats.avg_minutes_to_post) + " min" : "—";
      document.getElementById("stats").innerHTML = [
        { k: "Today", v: stats?.today_count ?? 0 },
        { k: "Active", v: stats?.active_count ?? 0 },
        { k: "Avg time-to-post", v: avgMin },
        { k: "Posted", v: stats?.success ?? 0 },
        { k: "Failed", v: stats?.failed ?? 0 },
        { k: "Rejected", v: stats?.rejected ?? 0 },
        { k: "Expired", v: stats?.expired ?? 0 },
      ].map(s => `<div class="stat"><div class="k">${s.k}</div><div class="v">${s.v}</div></div>`).join("");
      document.getElementById("rows").innerHTML = clips.map(c => {
        const urls = c.post_urls ? JSON.parse(c.post_urls) : {};
        const links = Object.entries(urls).map(([k,v]) => `<a href="${v}" target="_blank">${k}</a>`).join(" · ");
        return `<tr>
          <td><code>${c.id.slice(0,8)}</code></td>
          <td><span class="pill ${c.status}">${c.status}</span></td>
          <td>@${c.triggered_by}</td>
          <td>${c.triggered_at}</td>
          <td>${links || (c.posted_at ?? "—")}</td>
        </tr>`;
      }).join("");
      document.getElementById("updated").textContent = "updated " + new Date().toLocaleTimeString();
    }

    if (getToken()) {
      renderDashboardShell();
      load();
      setInterval(load, 15000);
    } else {
      renderLogin();
    }
  </script>
</body>
</html>
