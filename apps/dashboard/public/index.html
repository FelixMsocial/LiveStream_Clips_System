<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ClipFactory dashboard</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0d11; --panel:#151821; --muted:#8a93a6; --fg:#e7ecf3; --ok:#27d07f; --warn:#f2b544; --err:#ff6472; --accent:#4f8cff; --border:#2a2f3a; }
    body { margin:0; font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:16px 24px; border-bottom:1px solid #222733; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    header .right { display:flex; align-items:center; gap:12px; }
    main { padding:24px; max-width:1200px; margin:0 auto; }
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
    .stat { background:var(--panel); padding:16px; border-radius:10px; }
    .stat .k { color:var(--muted); font-size:12px; }
    .stat .v { font-size:24px; font-weight:600; margin-top:4px; }
    table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden; }
    th, td { padding:10px 12px; border-bottom:1px solid #222733; text-align:left; }
    th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
    td.clip-id-cell { cursor:pointer; }
    td.clip-id-cell:hover code { color:var(--accent); }
    .pill { padding:2px 8px; border-radius:999px; font-size:12px; display:inline-block; }
    .pill.posted { background:#113a22; color:var(--ok); }
    .pill.posted_partial { background:#2b2411; color:var(--warn); }
    .pill.dispatched { background:#112233; color:#7ab4ff; }
    .pill.pending_approval { background:#3a2f11; color:var(--warn); }
    .pill.rejected, .pill.expired, .pill.failed_capture, .pill.failed_edit, .pill.failed_post, .pill.post_failed { background:#3a1118; color:var(--err); }
    a { color:#8ebbff; }
    button { padding:6px 12px; border-radius:6px; border:0; cursor:pointer; font-weight:600; background:var(--accent); color:#06122b; }
    button.ghost { background:#2a2f3a; color:var(--fg); }
    .login { display:flex; align-items:center; justify-content:center; min-height:60vh; }
    .login-card { background:var(--panel); padding:28px; border-radius:12px; width:340px; }
    .login-card h2 { margin:0 0 16px; font-size:16px; }
    .login-card input { width:100%; padding:10px; background:#0b0d11; color:var(--fg); border:1px solid #2a2f3a; border-radius:8px; font:inherit; box-sizing:border-box; margin-bottom:8px; }
    .login-card .err { color:var(--err); margin-top:10px; font-size:12px; }
    .login-card button { width:100%; margin-top:12px; padding:10px; }

    /* ── Clip detail drawer ── */
    .detail-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100;
      align-items:flex-start; justify-content:flex-end;
    }
    .detail-overlay.open { display:flex; }
    .detail-drawer {
      background:var(--panel); width:min(480px,100vw); height:100vh; overflow-y:auto;
      padding:24px; box-shadow:-4px 0 24px rgba(0,0,0,.4);
      display:flex; flex-direction:column; gap:16px;
    }
    .detail-drawer h2 { margin:0; font-size:15px; }
    .detail-close { margin-left:auto; background:#2a2f3a; color:var(--fg); }
    .detail-row { display:flex; flex-direction:column; gap:4px; }
    .detail-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:600; }
    .detail-value { font-size:13px; }
    .platform-block { display:flex; flex-direction:column; gap:8px; }
    .platform-row { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
    .platform-name { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:4px; }
    .platform-live { color:var(--ok); font-size:13px; }
    .platform-err { color:var(--err); font-size:13px; }
    .platform-dash { color:var(--muted); font-size:13px; }
    .metricool-ids { font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; word-break:break-all; }
    hr.detail-divider { border:none; border-top:1px solid var(--border); margin:0; }
  </style>
</head>
<body>
  <header>
    <strong>ClipFactory</strong>
    <div class="right">
      <span id="updated" style="color:var(--muted)"></span>
      <button id="logoutBtn" class="ghost" style="display:none">Sign out</button>
    </div>
  </header>
  <main id="main"></main>

  <!-- Clip detail drawer -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-drawer" id="detailDrawer">
      <div style="display:flex;align-items:center;gap:10px">
        <h2 id="detailTitle">Clip detail</h2>
        <button class="detail-close ghost" id="detailClose">✕ Close</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <script>
    const API = (window.CLIPFACTORY_API ?? "").replace(/\/$/, "");
    const TOKEN_KEY = "clipfactory.dashboard.token";

    function apiUrl(path) {
      return API ? `${API}${path}` : path;
    }

    function getToken() {
      const fromUrl = new URLSearchParams(window.location.search).get("t");
      if (fromUrl) {
        localStorage.setItem(TOKEN_KEY, fromUrl);
        const url = new URL(window.location.href);
        url.searchParams.delete("t");
        window.history.replaceState({}, "", url.toString());
        return fromUrl;
      }
      return localStorage.getItem(TOKEN_KEY) ?? "";
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
    }

    function renderLogin(errMsg) {
      document.getElementById("main").innerHTML = `
        <div class="login">
          <form class="login-card" id="loginForm">
            <h2>Sign in</h2>
            <input id="username" type="text" placeholder="Username" autocomplete="username" required />
            <input id="secret" type="password" placeholder="Password" autocomplete="current-password" required />
            <button type="submit">Sign in</button>
            <div class="err" id="loginErr">${errMsg ?? ""}</div>
          </form>
        </div>`;
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const secret = document.getElementById("secret").value;
        const errEl = document.getElementById("loginErr");
        errEl.textContent = "Signing in…";
        try {
          const res = await fetch(apiUrl(`/api/auth/login`), {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, password: secret }),
          });
          if (!res.ok) {
            errEl.textContent = res.status === 401 ? "Invalid username or password." : `Sign-in failed (${res.status}).`;
            return;
          }
          const { token } = await res.json();
          localStorage.setItem(TOKEN_KEY, token);
          renderDashboardShell();
          load();
        } catch (err) {
          errEl.textContent = "Network error: " + err;
        }
      });
    }

    function renderDashboardShell() {
      document.getElementById("main").innerHTML = `
        <section class="stats" id="stats"></section>
        <table>
          <thead><tr><th>ID</th><th>Status</th><th>Triggered by</th><th>Triggered at</th><th>Brand</th><th>Posted</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>`;
      const logout = document.getElementById("logoutBtn");
      logout.style.display = "inline-block";
      logout.onclick = () => { clearToken(); renderLogin(); };
    }

    async function load() {
      const token = getToken();
      if (!token) { renderLogin(); return; }
      try {
        const res = await fetch(apiUrl(`/api/dashboard?t=${encodeURIComponent(token)}`));
        if (res.status === 403) { clearToken(); renderLogin("Session expired. Sign in again."); return; }
        if (!res.ok) { document.getElementById("updated").textContent = `error: HTTP ${res.status}`; return; }
        const ct = res.headers.get("content-type") ?? "";
        if (!ct.includes("application/json")) {
          document.getElementById("updated").textContent = "error: API returned non-JSON (proxy misconfigured?)";
          return;
        }
        const data = await res.json();
        render(data.clips ?? [], data.stats ?? {});
      } catch (e) {
        document.getElementById("updated").textContent = "error: " + e;
      }
    }

    function esc(s) {
      return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function render(clips, stats) {
      const avgMin = stats?.avg_minutes_to_post != null ? Math.round(stats.avg_minutes_to_post) + " min" : "—";
      document.getElementById("stats").innerHTML = [
        { k: "Today", v: stats?.today_count ?? 0 },
        { k: "Active", v: stats?.active_count ?? 0 },
        { k: "Avg time-to-post", v: avgMin },
        { k: "Posted", v: stats?.success ?? 0 },
        { k: "Failed", v: stats?.failed ?? 0 },
        { k: "Rejected", v: stats?.rejected ?? 0 },
        { k: "Expired", v: stats?.expired ?? 0 },
      ].map(s => `<div class="stat"><div class="k">${s.k}</div><div class="v">${s.v}</div></div>`).join("");

      document.getElementById("rows").innerHTML = clips.map(c => {
        const urls = c.post_urls ? JSON.parse(c.post_urls) : {};
        const links = Object.entries(urls).map(([k,v]) => `<a href="${esc(v)}" target="_blank">${esc(k)}</a>`).join(" · ");
        const brandCol = c.dispatched_brand_name ? esc(c.dispatched_brand_name) : "—";
        return `<tr>
          <td class="clip-id-cell" data-id="${esc(c.id)}"><code title="${esc(c.id)}">${c.id.slice(0,8)}</code></td>
          <td><span class="pill ${esc(c.status)}">${esc(c.status)}</span></td>
          <td>@${esc(c.triggered_by)}</td>
          <td>${esc(c.triggered_at)}</td>
          <td style="font-size:12px;color:var(--muted)">${brandCol}</td>
          <td>${links || esc(c.posted_at ?? "—")}</td>
        </tr>`;
      }).join("");

      // Wire up click-to-detail on ID cells
      for (const cell of document.querySelectorAll(".clip-id-cell")) {
        cell.addEventListener("click", () => openDetail(cell.dataset.id));
      }

      document.getElementById("updated").textContent = "updated " + new Date().toLocaleTimeString();
    }

    // ── Clip detail drawer ── //

    document.getElementById("detailClose").addEventListener("click", closeDetail);
    document.getElementById("detailOverlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("detailOverlay")) closeDetail();
    });

    function closeDetail() {
      document.getElementById("detailOverlay").classList.remove("open");
    }

    async function openDetail(clipId) {
      const token = getToken();
      if (!token) return;
      document.getElementById("detailTitle").textContent = `Clip ${clipId.slice(0,8)}`;
      document.getElementById("detailBody").innerHTML = "<p style='color:var(--muted)'>Loading…</p>";
      document.getElementById("detailOverlay").classList.add("open");
      try {
        const res = await fetch(apiUrl(`/api/dashboard/clips/${encodeURIComponent(clipId)}?t=${encodeURIComponent(token)}`));
        if (!res.ok) {
          document.getElementById("detailBody").innerHTML = `<p style='color:var(--err)'>Error ${res.status}</p>`;
          return;
        }
        const { clip } = await res.json();
        renderDetail(clip);
      } catch (e) {
        document.getElementById("detailBody").innerHTML = `<p style='color:var(--err)'>${esc(String(e))}</p>`;
      }
    }

    function renderDetail(clip) {
      const PLATFORMS = ["tiktok", "youtube", "instagram"];
      const postUrls = clip.post_urls ? JSON.parse(clip.post_urls) : {};
      const postErrors = clip.post_errors ? JSON.parse(clip.post_errors) : {};
      const metricoolIds = clip.metricool_post_ids ? JSON.parse(clip.metricool_post_ids) : null;

      let html = "";

      // Status
      html += `<div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value"><span class="pill ${esc(clip.status)}">${esc(clip.status)}</span></div>
      </div>`;

      // Dispatched brand — only show if set
      if (clip.dispatched_brand_id != null) {
        html += `<hr class="detail-divider">
        <div class="detail-row">
          <div class="detail-label">Dispatched to</div>
          <div class="detail-value">${esc(clip.dispatched_brand_name ?? "unknown")} <span style="color:var(--muted);font-size:12px">(blog_id ${esc(clip.dispatched_blog_id)})</span></div>
        </div>`;
        if (clip.dispatched_at) {
          html += `<div class="detail-row">
            <div class="detail-label">Dispatched at</div>
            <div class="detail-value" style="font-size:12px;color:var(--muted)">${esc(clip.dispatched_at)}</div>
          </div>`;
        }
      }

      // Per-platform status
      html += `<hr class="detail-divider">
      <div class="detail-row">
        <div class="detail-label">Per-platform status</div>
        <div class="platform-block">`;
      for (const p of PLATFORMS) {
        const url = postUrls[p];
        const err = postErrors[p];
        let statusEl;
        if (url) {
          statusEl = `<span class="platform-live">✅ <a href="${esc(url)}" target="_blank">${esc(url)}</a></span>`;
        } else if (err) {
          statusEl = `<span class="platform-err">❌ ${esc(err)}</span>`;
        } else {
          statusEl = `<span class="platform-dash">—</span>`;
        }
        html += `<div class="platform-row">
          <div class="platform-name">${esc(p)}</div>
          ${statusEl}
        </div>`;
      }
      html += `</div></div>`;

      // Metricool post IDs — only if set
      if (metricoolIds && Object.keys(metricoolIds).length > 0) {
        html += `<hr class="detail-divider">
        <div class="detail-row">
          <div class="detail-label">Metricool post IDs</div>
          <div class="metricool-ids">${esc(JSON.stringify(metricoolIds))}</div>
        </div>`;
      }

      // Alert sent at — show if any alert was sent
      if (clip.alert_sent_at) {
        html += `<div class="detail-row">
          <div class="detail-label">Alert sent at</div>
          <div class="detail-value" style="font-size:12px;color:var(--muted)">${esc(clip.alert_sent_at)}</div>
        </div>`;
      }

      // Basic info
      html += `<hr class="detail-divider">
      <div class="detail-row">
        <div class="detail-label">Clip ID</div>
        <div class="detail-value" style="font-size:11px;color:var(--muted);font-family:ui-monospace,monospace">${esc(clip.id)}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Triggered by</div>
        <div class="detail-value">@${esc(clip.triggered_by)} at ${esc(clip.triggered_at)}</div>
      </div>`;

      document.getElementById("detailBody").innerHTML = html;
    }

    if (getToken()) {
      renderDashboardShell();
      load();
      setInterval(load, 15000);
    } else {
      renderLogin();
    }
  </script>
</body>
</html>
